<!DOCTYPE html>
<html>
<head>
    <title>MBTA Map</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
     integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
     crossorigin=""/>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
     integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
     crossorigin=""></script>

    <style>
        #map { height: 100%; }
        html, body { 
            height: 100%; 
            margin: 0;
            padding: 0;
        }
    </style>
</head>
<body>
    <div id="map"></div>
    <script src="https://cdn.jsdelivr.net/npm/@mapbox/polyline@1.2.1/src/polyline.js"></script>
    <script type="module" src="map.js"></script>
    <a href="https://github.com/brettmt2/mbta-map" target="_blank" rel="noopener noreferrer"
   style="position: fixed; bottom: 20px; right: 20px; z-index: 9999;">
    <img 
        src="https://github.githubassets.com/images/modules/logos_page/GitHub-Mark.png"
        alt="GitHub Repo"
        style="width: 80px; height: 80px; opacity: 0.8; transition: opacity 0.2s ease;"
        onmouseover="this.style.opacity=1"
        onmouseout="this.style.opacity=0.5"
    />
    </a>
</body>
</html>
